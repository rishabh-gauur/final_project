<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ward Details & Analytics Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { 
            background-color: #f8fafc; 
        }
        .header-bg {
            background-color: var(--surface-color);
            background-image: linear-gradient(rgba(14, 165, 233, 0.85), rgba(37, 99, 235, 0.9)), url('images/hospital_banner.png');
            background-size: cover;
            background-position: center;
            padding: 3rem 2rem;
            color: white;
            border-bottom: 4px solid var(--primary-color);
            box-shadow: var(--shadow-lg);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .dashboard-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }
        .controls-card {
            background-color: var(--surface-color);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-soft);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
        }
        .stat-box {
            padding: 2.5rem 2rem;
            border-radius: 20px;
            background: var(--surface-color);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-soft);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .stat-box:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .stat-box.primary { border-top: 6px solid var(--primary-color); }
        .stat-box.danger { border-top: 6px solid var(--error); }
        .stat-box.success { border-top: 6px solid var(--success); }
        
        .stat-label {
            font-size: 0.95rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }
        .stat-value {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.025em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }
        .table-card {
            background-color: var(--surface-color);
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            border: 1px solid var(--border-soft);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background-color: #e0f2fe;
            padding: 1.25rem;
            text-align: left;
            font-weight: 700;
            color: #0284c7;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.85rem;
            border-bottom: 1px solid var(--border-soft);
        }
        td {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border-soft);
            vertical-align: middle;
        }
        tr { transition: background-color 0.2s ease; }
        tr:hover {
            background-color: #f0f9ff;
        }
        .badge-staff {
            display: inline-block;
            background-color: #e0e7ff;
            color: #4338ca;
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 600;
            margin: 0.1rem;
        }
        .status-stable { color: #10b981; font-weight: 600; }
        .status-recovering { color: #3b82f6; font-weight: 600; }
        .status-critical { color: #ef4444; font-weight: 600; }
        .status-observation { color: #f59e0b; font-weight: 600; }

        @media (max-width: 900px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .header-bg {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <header class="header-bg">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div style="background-color: rgba(255,255,255,0.1); padding: 8px; border-radius: 8px;">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line>
                </svg>
            </div>
            <div>
                <h1 style="font-size: 1.75rem; font-weight: 800; letter-spacing: -0.025em; text-shadow: 0 2px 4px rgba(0,0,0,0.2);">Ward Analytics Engine</h1>
                <p style="font-size: 0.95rem; opacity: 0.85; font-weight: 500;">Real-time hospital capacity monitoring</p>
            </div>
        </div>
        <div style="display: flex; gap: 10px;">
            <a href="admin-dashboard.html" class="btn-primary" style="text-decoration: none; padding: 0.5rem 1rem; border-radius: 4px; font-weight: 500; font-size: 0.9rem; background-color: #4f46e5;">← Back to Control Panel</a>
        </div>
    </header>

    <div class="dashboard-container">
        
        <!-- Controls -->
        <div class="controls-card">
            <h2 style="margin-bottom: 1rem; font-size: 1.25rem; color: #1e293b;">Select Ward Configuration</h2>
            <select id="wardSelector" style="width: 100%; max-width: 400px; padding: 0.75rem; border: 2px solid #cbd5e1; border-radius: 6px; font-size: 1rem;">
                <option value="" disabled selected>-- Select a Ward to Load Details --</option>
                <option value="Ward A">Ward A Analytics</option>
                <option value="Ward B">Ward B Analytics</option>
            </select>
        </div>

        <div id="analyticsContent" style="display: none;">
            <!-- Box 1: Stats -->
            <div class="stats-grid" style="margin-bottom: 2.5rem;">
                <div class="stat-box primary">
                    <div class="stat-label">Total Beds</div>
                    <div class="stat-value" id="statTotal">10</div>
                </div>
                <div class="stat-box danger">
                    <div class="stat-label">Admitted (Filled)</div>
                    <div class="stat-value" id="statFilled" style="color: var(--error);">0</div>
                </div>
                <div class="stat-box success">
                    <div class="stat-label">Available (Empty)</div>
                    <div class="stat-value" id="statEmpty" style="color: var(--success);">0</div>
                </div>
            </div>

            <!-- Box 2: Bed Details -->
            <div class="table-card">
                <div style="padding: 1.5rem; background-color: #fff; border-bottom: 1px solid #e2e8f0;">
                    <h3 style="font-weight: 700; color: #1e293b;" id="bedDetailsHeader">Bed Details Matrix</h3>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th style="width: 15%; border-top-left-radius: 12px;">Bed Number</th>
                            <th style="width: 40%;">Patient Information</th>
                            <th style="width: 45%; border-top-right-radius: 12px;">Allotted Staff Monitoring</th>
                        </tr>
                    </thead>
                    <tbody id="bedTableBody">
                        <!-- Loaded dynamically -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        const wardSelector = document.getElementById('wardSelector');
        const analyticsContent = document.getElementById('analyticsContent');
        const bedTableBody = document.getElementById('bedTableBody');

        let refreshInterval = null;

        wardSelector.addEventListener('change', async (e) => {
            const ward = e.target.value;
            analyticsContent.style.display = 'block';
            await loadWardData(ward);
            
            // Set up real-time polling
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(() => loadWardData(ward), 3000);
        });

        async function loadWardData(ward) {
            try {
                // Only show "loading" the very first time
                if (bedTableBody.innerHTML === '') {
                    bedTableBody.innerHTML = '<tr><td colspan="3" style="text-align:center;">Loading matrix data...</td></tr>';
                }
                
                const response = await fetch('https://final-project-jjw5.onrender.com/api/admin/ward/' + encodeURIComponent(ward));
                
                // If unauthorized or not admin, it might redirect to login.html due to interceptors/fetch wrapper,
                // but fetch will just resolve. Let's gracefully handle non-ok.
                if (response.status === 401 || response.status === 403) window.location.href = 'admin-login.html';
                
                const data = await response.json();

                if (data.success) {
                    document.getElementById('statTotal').textContent = data.total_beds;
                    document.getElementById('statFilled').textContent = data.filled_beds;
                    document.getElementById('statEmpty').textContent = data.empty_beds;
                    document.getElementById('bedDetailsHeader').textContent = `${ward} - Comprehensive Details`;

                    bedTableBody.innerHTML = '';

                    data.beds.forEach(bed => {
                        const tr = document.createElement('tr');
                        
                        let patientHtml = '<span style="color:#94a3b8; font-style:italic;">Empty (No Patient)</span>';
                        if (bed.patient) {
                            const pStatus = bed.patient.status.toLowerCase();
                            const v = bed.patient.vitals;
                            patientHtml = `
                                <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                                    <div>
                                        <div style="font-weight: 700; color: #1e293b; font-size: 1.1rem; margin-bottom: 0.25rem;">${bed.patient.name}</div>
                                        <div style="font-size: 0.85rem;">Status: <span class="status-${pStatus}">${bed.patient.status}</span> <span style="color:#64748b; font-size:0.75rem;">(Anomaly Risk: ${(bed.patient.risk_probability*100).toFixed(1)}%)</span></div>
                                    </div>
                                    <div style="font-size: 0.8rem; display: grid; grid-template-columns: 1fr 1fr; gap: x 0.5rem; background-color: #f8fafc; padding: 0.5rem; border-radius: 6px; border: 1px solid #e2e8f0; width: 60%;">
                                        <div><span style="color:#64748b; font-weight:600;">BP:</span> <strong>${v.bp}</strong></div>
                                        <div><span style="color:#64748b; font-weight:600;">HR:</span> <strong>${v.heart_rate}</strong></div>
                                        <div><span style="color:#64748b; font-weight:600;">SpO2:</span> <strong>${v.spo2}%</strong></div>
                                        <div><span style="color:#64748b; font-weight:600;">Temp:</span> <strong>${v.temperature}°</strong></div>
                                        <div><span style="color:#64748b; font-weight:600;">Resp:</span> <strong>${v.resp_rate}</strong></div>
                                        <div><span style="color:#64748b; font-weight:600;">MAP:</span> <strong>${v.map}</strong></div>
                                    </div>
                                </div>
                            `;
                        }

                        let staffHtml = '<span style="color:#94a3b8;">Unassigned</span>';
                        if (bed.staff && bed.staff.length > 0) {
                            staffHtml = bed.staff.map(s => `<span class="badge-staff">${s}</span>`).join(' ');
                        }

                        tr.innerHTML = `
                            <td><strong style="color:var(--primary-color); font-size:1.1rem;">${bed.bed_number}</strong></td>
                            <td>${patientHtml}</td>
                            <td>${staffHtml}</td>
                        `;
                        bedTableBody.appendChild(tr);
                    });

                } else {
                    bedTableBody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:red;">${data.message}</td></tr>`;
                }
            } catch (error) {
                bedTableBody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:red;">Error fetching analytics.</td></tr>`;
            }
        }
    </script>
</body>
</html>
