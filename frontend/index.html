<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthAlert Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="glass-card" id="auth-card">
        <!-- Login Form -->
        <div id="login-section">
            <h2>Welcome Back</h2>
            <p class="subtitle">Log in to monitor your patients.</p>
            <form id="login-form">
                <div class="input-group">
                    <label for="login-id">Nurse ID</label>
                    <input type="text" id="login-id" required placeholder="Enter your ID">
                </div>
                <div class="input-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn">Log In</button>
            </form>
            <div class="toggle-form">
                Don't have an account? <a onclick="toggleAuth('signup')">Sign up</a>
            </div>
        </div>

        <!-- Signup Form -->
        <div id="signup-section" style="display: none;">
            <h2>Create Account</h2>
            <p class="subtitle">Join HealthAlert platform.</p>
            <form id="signup-form">
                <div class="input-group">
                    <label for="signup-name">Full Name</label>
                    <input type="text" id="signup-name" required placeholder="Jane Doe">
                </div>
                <div class="input-group">
                    <label for="signup-id">Nurse ID</label>
                    <input type="text" id="signup-id" required placeholder="Choose a unique ID">
                </div>
                <div class="input-group">
                    <label for="signup-pass">Password</label>
                    <input type="password" id="signup-pass" required placeholder="Create a password">
                </div>
                <div class="input-group">
                    <label for="signup-mobile">Mobile Number (For SMS)</label>
                    <input type="tel" id="signup-mobile" required placeholder="+1234567890">
                </div>
                <button type="submit" class="btn">Register</button>
            </form>
            <div class="toggle-form">
                Already registered? <a onclick="toggleAuth('login')">Log in</a>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
