<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Administration - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { 
            background-color: var(--bg-color); 
        }
        .hospital-logo {
            background-color: rgba(79, 70, 229, 0.1);
        }
    </style>
</head>
<body>
    <div class="login-container" style="max-width: 800px;">
        <div class="login-header">
            <div class="hospital-logo">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                </svg>
            </div>
            <h2>Admin Registration</h2>
            <p>Create a secure system administrator account</p>
        </div>

        <form id="registerForm" class="login-form">
            <div id="errorMessage" class="error-message" style="display: none;"></div>
            <div id="successMessage" class="success-message" style="display: none; background-color: #e0e7ff; color: #3730a3; padding: 0.75rem; border-radius: 6px; font-size: 0.875rem; text-align: center; border: 1px solid #c7d2fe;"></div>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.25rem;">
                <div class="form-group" style="grid-column: 1 / -1;">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter admin full name" required>
                </div>

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Choose admin username" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="admin@hospital.com" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a strong password" required autocomplete="new-password">
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required autocomplete="new-password">
                </div>
            </div>

            <button type="submit" class="btn-primary" id="registerBtn" style="margin-top: 0.5rem;">Create Admin</button>
        </form>
        
        <div class="login-footer">
            <p>Already have access? <a href="admin-login.html" style="color: var(--primary-color); text-decoration: none; font-weight: 600;">Log In</a></p>
        </div>
    </div>

    <script>
        const registerForm = document.getElementById('registerForm');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const registerBtn = document.getElementById('registerBtn');

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!name || !username || !email || !password || !confirmPassword) return showError('All fields are required.');
            
            if (password !== confirmPassword) return showError('Passwords do not match.');

            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
            registerBtn.textContent = 'Registering...';
            registerBtn.disabled = true;

            try {
                const response = await fetch('http://localhost:5000/api/admin/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, username, email, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    successMessage.textContent = 'Admin created! Redirecting to login...';
                    successMessage.style.display = 'block';
                    setTimeout(() => window.location.href = data.redirect, 2000);
                } else {
                    showError(data.message || 'Registration failed.');
                    registerBtn.textContent = 'Create Admin';
                    registerBtn.disabled = false;
                }
            } catch (error) {
                showError('A network error occurred.');
                registerBtn.textContent = 'Create Admin';
                registerBtn.disabled = false;
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            successMessage.style.display = 'none';
        }
    </script>
</body>
</html>
